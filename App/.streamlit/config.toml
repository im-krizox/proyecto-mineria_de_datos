[theme]
# Paleta nativa de Streamlit (tablas, inputs, checkboxes, sliders, menús).
# Coincide con el modo oscuro de lib/theme.py — gris casi negro.
base = "dark"
primaryColor = "#f5a623"
backgroundColor = "#0d0d0f"
secondaryBackgroundColor = "#161619"
textColor = "#ededf0"
font = "sans serif"

[server]
headless = true
runOnSave = true
fileWatcherType = "watchdog"

[browser]
gatherUsageStats = false
